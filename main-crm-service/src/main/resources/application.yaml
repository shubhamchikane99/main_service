info:
  build:
    artifact: '@project.artifactId@'
    name: '@project.name@'
    description: '@project.description@'
    version: '@project.version@'

server:
  port: ${APP_SERVER_PORT:8098}
  tomcat:
    relaxed-query-chars:
      - '{'
      - '}'

spring:
  application:
    name: crm-service
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: IST
  datasource:
    hikari:
      auto-commit: true
  main:
    allow-bean-definition-overriding: true

eureka:
  instance:
    prefer-ip-address: true
    #ip-address: 127.0.0.1
    #hostname: localhost
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    health-check-url-path: /actuator/health
  client:
    registerWithEureka: true
    fetchRegistry: true
    service-url:
      defaultZone: http://${DISCOVERY_USERNAME:test}:${DISCOVERY_PASSWORD:test}@${DISCOVERY_HOST:localhost}:${DISCOVERY_PORT:8761}/eureka
    registry-fetch-interval-seconds: 5

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-my-super-secret-key-my-super-secret-key-1234567890}

# Auth service URL for direct-call validation (when gateway is bypassed)
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
    validate-endpoint: /public/token/validate

edue:
  multitenancy:
    tenantKeyVsId:
      DEFAULT: tenant1
      TEST1: tenant2

    tenantAndDataSourceProperties:
      DEFAULT:
        url: jdbc:mysql://127.0.0.1:3306/crm_db?useSSL=false&allowPublicKeyRetrieval=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Kolkata
        driverClassName: com.mysql.jdbc.Driver
        username: root
        password: 
      TEST1:
        url: jdbc:mysql://127.0.0.1:3306/journal_db?useSSL=false&allowPublicKeyRetrieval=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Kolkata
        driverClassName: com.mysql.jdbc.Driver
        username: root
        password: 
      Hyderabad:
        

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ====================== LOGGING ======================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [tenant=%X{tenantId}] [user=%X{username}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.microservices.crm: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE